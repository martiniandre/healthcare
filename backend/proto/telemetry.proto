syntax = "proto3";

package telemetry.v1;

option go_package = "github.com/healthcare/backend/internal/modules/telemetry/pb";

service TelemetryService {
  rpc GetRooms(GetRoomsRequest) returns (GetRoomsResponse);
  rpc UnlockRoom(UnlockRoomRequest) returns (UnlockRoomResponse);
  rpc GetBeds(GetBedsRequest) returns (GetBedsResponse);
  rpc UpdateBedCondition(UpdateBedConditionRequest) returns (UpdateBedConditionResponse);
}

message TelemetryRoom {
  string id = 1;
  string name = 2;
  string description = 3;
}

message TelemetryBed {
  string id = 1;
  string room_id = 2;
  string bed_number = 3;
  string patient_name = 4;
  int32 age = 5;
  string gender = 6;
  int32 bpm = 7;
  int32 spo2 = 8;
  double temperature = 9;
  string status = 10;
  string condition = 11;
}

message GetRoomsRequest {}

message GetRoomsResponse {
  repeated TelemetryRoom rooms = 1;
}

message UnlockRoomRequest {
  string room_id = 1;
  string passcode = 2;
}

message UnlockRoomResponse {
  bool success = 1;
  string room_name = 2;
}

message GetBedsRequest {
  string room_id = 1;
}

message GetBedsResponse {
  repeated TelemetryBed beds = 1;
}

message UpdateBedConditionRequest {
  string bed_id = 1;
  int32 bpm = 2;
  int32 spo2 = 3;
  double temperature = 4;
  string status = 5;
  string condition = 6;
}

message UpdateBedConditionResponse {
  bool success = 1;
}
