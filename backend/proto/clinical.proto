syntax = "proto3";

package clinical.v1;

option go_package = "github.com/healthcare/backend/internal/modules/clinical/pb";

service ClinicalService {
  rpc CreateEncounter(CreateEncounterRequest) returns (CreateEncounterResponse);
  rpc GetEncounters(GetEncountersRequest) returns (GetEncountersResponse);

  rpc CreateObservation(CreateObservationRequest) returns (CreateObservationResponse);
  rpc GetObservations(GetObservationsRequest) returns (GetObservationsResponse);

  rpc CreateCondition(CreateConditionRequest) returns (CreateConditionResponse);
  rpc GetConditions(GetConditionsRequest) returns (GetConditionsResponse);

  rpc CreateAllergyIntolerance(CreateAllergyIntoleranceRequest) returns (CreateAllergyIntoleranceResponse);
  rpc GetAllergyIntolerances(GetAllergyIntolerancesRequest) returns (GetAllergyIntolerancesResponse);

  rpc CreateMedicationRequest(CreateMedicationRequestRequest) returns (CreateMedicationRequestResponse);
  rpc GetMedicationRequests(GetMedicationRequestsRequest) returns (GetMedicationRequestsResponse);

  rpc CreateDiagnosticReport(CreateDiagnosticReportRequest) returns (CreateDiagnosticReportResponse);
  rpc GetDiagnosticReports(GetDiagnosticReportsRequest) returns (GetDiagnosticReportsResponse);
}

message CreateEncounterRequest {
  string patient_fhir_id = 1;
  string practitioner_id = 2;
  string reason_code = 3;
  string reason_display = 4;
}

message CreateEncounterResponse {
  string encounter_fhir_id = 1;
}

message GetEncountersRequest {
  string patient_fhir_id = 1;
}

message Encounter {
  string fhir_id = 1;
  string patient_fhir_id = 2;
  string status = 3;
  string reason_display = 4;
}

message GetEncountersResponse {
  repeated Encounter encounters = 1;
}

message CreateObservationRequest {
  string encounter_fhir_id = 1;
  string patient_fhir_id = 2;
  string loinc_code = 3;
  string code_display = 4;
  double value_quantity = 5;
  string value_unit = 6;
}

message CreateObservationResponse {
  string observation_fhir_id = 1;
}

message GetObservationsRequest {
  string encounter_fhir_id = 1;
}

message Observation {
  string fhir_id = 1;
  string loinc_code = 2;
  string code_display = 3;
  double value_quantity = 4;
  string value_unit = 5;
}

message GetObservationsResponse {
  repeated Observation observations = 1;
}

message CreateConditionRequest {
  string encounter_fhir_id = 1;
  string patient_fhir_id = 2;
  string icd10_code = 3;
  string code_display = 4;
  string clinical_status = 5;
}

message CreateConditionResponse {
  string condition_fhir_id = 1;
}

message GetConditionsRequest {
  string patient_fhir_id = 1;
}

message Condition {
  string fhir_id = 1;
  string icd10_code = 2;
  string code_display = 3;
  string clinical_status = 4;
}

message GetConditionsResponse {
  repeated Condition conditions = 1;
}

message CreateAllergyIntoleranceRequest {
  string patient_fhir_id = 1;
  string allergen_code = 2;
  string allergen_display = 3;
  string clinical_status = 4;
  string reaction = 5;
}

message CreateAllergyIntoleranceResponse {
  string allergy_fhir_id = 1;
}

message GetAllergyIntolerancesRequest {
  string patient_fhir_id = 1;
}

message AllergyIntolerance {
  string fhir_id = 1;
  string allergen_display = 2;
  string clinical_status = 3;
  string reaction = 4;
}

message GetAllergyIntolerancesResponse {
  repeated AllergyIntolerance allergies = 1;
}

message CreateMedicationRequestRequest {
  string encounter_fhir_id = 1;
  string patient_fhir_id = 2;
  string practitioner_fhir_id = 3;
  string medication_code = 4;
  string medication_name = 5;
  string dosage_instructions = 6;
}

message CreateMedicationRequestResponse {
  string medication_request_fhir_id = 1;
}

message GetMedicationRequestsRequest {
  string encounter_fhir_id = 1;
}

message MedicationRequest {
  string fhir_id = 1;
  string medication_name = 2;
  string dosage_instructions = 3;
  string status = 4;
}

message GetMedicationRequestsResponse {
  repeated MedicationRequest medication_requests = 1;
}

message CreateDiagnosticReportRequest {
  string encounter_fhir_id = 1;
  string patient_fhir_id = 2;
  string report_code = 3;
  string report_display = 4;
  string conclusion = 5;
}

message CreateDiagnosticReportResponse {
  string diagnostic_report_fhir_id = 1;
}

message GetDiagnosticReportsRequest {
  string encounter_fhir_id = 1;
}

message DiagnosticReport {
  string fhir_id = 1;
  string report_display = 2;
  string status = 3;
  string conclusion = 4;
}

message GetDiagnosticReportsResponse {
  repeated DiagnosticReport diagnostic_reports = 1;
}
