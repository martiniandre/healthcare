host: localhost:8080
info:
  contact:
    email: support@healthcare.com
    name: API Support
  description: Healthcare platform API with FHIR R4 interoperability
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Healthcare API
  version: "1.0"
paths:
  /analytics:
    get:
      consumes:
      - application/json
      description: Returns aggregated healthcare statistics including patient counts,
        consultation data, and exam modality distribution
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.Stats'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get analytics statistics
      tags:
      - analytics
  /audit-logs:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of audit logs (admin only)
      parameters:
      - default: 10
        description: Number of items per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit_logs.AuditLogListResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List audit logs
      tags:
      - audit_logs
    post:
      consumes:
      - application/json
      description: Creates a new audit log entry for tracking access and actions
      parameters:
      - description: Audit log data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/audit_logs.CreateAuditLogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/audit_logs.AuditLog'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create audit log entry
      tags:
      - audit_logs
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, returns JWT token
        via cookie
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Clears authentication and CSRF cookies to log the user out
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Returns the authenticated user's profile information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current user
      tags:
      - auth
  /encounters/{encounterFhirId}/medications:
    get:
      consumes:
      - application/json
      description: Returns all medication requests/prescriptions for an encounter
      parameters:
      - description: Encounter FHIR ID
        in: path
        name: encounterFhirId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/medication.MedicationResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List medications by encounter
      tags:
      - medications
    post:
      consumes:
      - application/json
      description: Creates a new medication request/prescription for an encounter
      parameters:
      - description: Encounter FHIR ID
        in: path
        name: encounterFhirId
        required: true
        type: string
      - description: Medication data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/medication.CreateMedicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/medication.CreateMedicationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a medication
      tags:
      - medications
  /encounters/{encounterFhirId}/observations:
    get:
      consumes:
      - application/json
      description: Returns all observations/vital signs for an encounter
      parameters:
      - description: Encounter FHIR ID
        in: path
        name: encounterFhirId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/observation.ObservationResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List observations by encounter
      tags:
      - observations
    post:
      consumes:
      - application/json
      description: Creates a new observation/vital sign for an encounter
      parameters:
      - description: Encounter FHIR ID
        in: path
        name: encounterFhirId
        required: true
        type: string
      - description: Observation data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/observation.CreateObservationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/observation.CreateObservationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an observation
      tags:
      - observations
  /encounters/{encounterFhirId}/reports:
    get:
      consumes:
      - application/json
      description: Returns all diagnostic reports for an encounter
      parameters:
      - description: Encounter FHIR ID
        in: path
        name: encounterFhirId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/diagnostic_report.DiagnosticReportResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List diagnostic reports by encounter
      tags:
      - diagnostic_reports
    post:
      consumes:
      - application/json
      description: Creates a new diagnostic report for an encounter
      parameters:
      - description: Encounter FHIR ID
        in: path
        name: encounterFhirId
        required: true
        type: string
      - description: Report data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/diagnostic_report.CreateDiagnosticReportRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/diagnostic_report.CreateDiagnosticReportResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a diagnostic report
      tags:
      - diagnostic_reports
  /exam-analyses:
    get:
      consumes:
      - application/json
      description: Returns all exam analyses, optionally filtered by patient FHIR
        ID
      parameters:
      - description: Filter by patient FHIR ID
        in: query
        name: patientFhirId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/exam_analyzer.ExamAnalysisResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List exam analyses
      tags:
      - exam_analyzer
    post:
      consumes:
      - multipart/form-data
      description: Uploads a medical exam file for AI analysis with consent tracking
        and optional anonymization
      parameters:
      - description: Patient FHIR ID
        in: formData
        name: patientFhirId
        type: string
      - description: Patient consent (must be 'true')
        in: formData
        name: consent
        required: true
        type: string
      - description: Anonymize file (true/false)
        in: formData
        name: anonymize
        type: string
      - description: Medical exam file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/exam_analyzer.ExamAnalysisResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create exam analysis
      tags:
      - exam_analyzer
  /exam-analyses/{analysisId}:
    delete:
      consumes:
      - application/json
      description: Permanently deletes an exam analysis and its associated file
      parameters:
      - description: Analysis UUID
        in: path
        name: analysisId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/exam_analyzer.DeleteAnalysisResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete exam analysis
      tags:
      - exam_analyzer
    get:
      consumes:
      - application/json
      description: Returns details of a specific exam analysis by ID
      parameters:
      - description: Analysis UUID
        in: path
        name: analysisId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/exam_analyzer.ExamAnalysisResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get exam analysis
      tags:
      - exam_analyzer
  /patients:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of patients with optional search/filter
      parameters:
      - description: Search term
        in: query
        name: search
        type: string
      - description: Sort field
        in: query
        name: sortField
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sortDirection
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/patients.PatientListResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all patients
      tags:
      - patients
    post:
      consumes:
      - application/json
      description: Creates a new patient record and FHIR resource
      parameters:
      - description: Patient data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/patients.CreatePatientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/patients.CreatePatientResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new patient
      tags:
      - patients
  /patients/{patientFhirId}:
    get:
