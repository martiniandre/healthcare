services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: "50051"
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://healthcare:healthcare_dev@postgres:5432/healthcare?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "dev-secret-change-in-production"
      GCP_PROJECT_ID: ""
      GCP_LOCATION_ID: ""
      GCP_DATASET_ID: ""
      GCP_FHIR_STORE: ""
      GCS_BUCKET_NAME: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
