version: '3.8'

services:
  # O daemon do Docker rodando dentro do container (Docker-in-Docker)
  # ATENÇÃO: Requer privilégios elevados (privileged: true) no host
  docker-daemon:
    image: docker:dind
    container_name: dind-daemon
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      - "2375:2375"
      - "8080:8080" # Expõe a API backend para o seu computador
      - "3000:3000" # Expõe o Frontend React para o seu computador
    volumes:
      # Muito Importante: Compartilha o código fonte com o daemon do docker interno
      - ../:/src
    networks:
      - docker-net
    restart: unless-stopped

  # Um container cliente de exemplo que executará comandos docker apontando para o daemon acima
  docker-client:
    image: docker:latest
    container_name: dind-client
    environment:
      DOCKER_HOST: tcp://docker-daemon:2375
    volumes:
      # Muito Importante: Compartilha o mesmo caminho exato do código fonte
      - ../:/src
    depends_on:
      - docker-daemon
    networks:
      - docker-net
    entrypoint: ["sh", "-c", "echo 'Aguardando inicialização do daemon...' && sleep 5 && docker info && echo 'Pronto! Para iniciar o frontend e backend aninhados, execute: docker exec -it dind-client docker compose -f /src/docker-in-docker/docker-compose.nested.yml up --build -d' && tail -f /dev/null"]

networks:
  docker-net:
    driver: bridge
