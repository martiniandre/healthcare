name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: healthcare-api
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_REPO: healthcare

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE=${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE_TAG=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "APP_ENV=production" \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "GCP_LOCATION_ID=${{ secrets.GCP_LOCATION_ID }}" \
            --set-env-vars "GCP_DATASET_ID=${{ secrets.GCP_DATASET_ID }}" \
            --set-env-vars "GCP_FHIR_STORE_ID=${{ secrets.GCP_FHIR_STORE_ID }}" \
            --set-env-vars "GCP_VERTEX_MODEL=${{ secrets.GCP_VERTEX_MODEL }}" \
            --set-env-vars "GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --set-env-vars "DB_URL=${{ secrets.CLOUD_RUN_DB_URL }}" \
            --set-env-vars "REDIS_URL=${{ secrets.CLOUD_RUN_REDIS_URL }}" \
            --set-env-vars "JWT_SECRET=${{ secrets.CLOUD_RUN_JWT_SECRET }}" \
            --set-env-vars "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify deployment health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Service URL: $SERVICE_URL"
          curl --fail --silent --max-time 30 "$SERVICE_URL/health" || exit 1
          echo "Health check passed"
